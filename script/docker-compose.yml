services:
  mysql-primary:
    image: $TEST_MYSQL_IMAGE
    container_name: mysql-primary
    command: --server-id=1
    init: true
    env_file:
      - .env
    environment:
      - MYSQL_TCP_PORT=3307
    volumes:
      - $CONF_PATH/create_user.sql:/docker-entrypoint-initdb.d/create_user.sql:ro
      - $CONF_PATH/common.cnf:/etc/mysql/conf.d/common.cnf:ro
      - ./docker/certs:/etc/mysql/certs:ro
    healthcheck:
      test: "mysql -h 127.0.0.1 -p$MYSQL_ROOT_PASSWORD -e 'select 1;' || exit 1"
      interval: 5s
      start_period: 10s
    ports:
      - '3307:3307'
  mysql-replica:
    extends: mysql-primary
    container_name: mysql-replica
    command: --server-id=2
    # Volumes (create_user.sql, common.cnf, certs) are inherited from
    # mysql-primary. Replication is NOT configured at init time: the harness
    # (docker-gh-ost-replica-tests setup) applies start_replication.sql once
    # both servers are up, so the primary is already reachable and the replica's
    # IO thread connects on the first try instead of racing the primary's boot.
    environment:
      - MYSQL_TCP_PORT=3308
    ports: !override
      - '3308:3308'
